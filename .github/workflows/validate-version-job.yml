name: Validate Version

on:
  workflow_call:

jobs:
  validate-version:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Extract version from csproj
      id: csproj
      working-directory: src
      run: |
        FILE=$(find . -maxdepth 2 -name "WB.Logging.csproj" | head -n 1)

        if [ -z "$FILE" ]; then
            echo "No csproj file found"
            exit 1
        fi

        VERSION=$(grep -oPm1 "(?<=<Version>)[^<]+" "$FILE")

        if [ -z "$VERSION" ]; then
            echo "No <Version> tag found in $FILE"
            exit 1
        fi

        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Compare tag with csproj version
      run: |
        TAG="${GITHUB_REF_NAME}"

        # Strip leading 'v' if present
        CLEAN_TAG="${TAG#v}"

        if [ "$CLEAN_TAG" != "${{ steps.csproj.outputs.version }}" ]; then
            echo "Version mismatch:"
            echo "  Tag:      $TAG"
            echo "  CleanTag: $CLEAN_TAG"
            echo "  csproj:   ${{ steps.csproj.outputs.version }}"
            exit 1
        fi

        echo "Version matches tag: $TAG"